server:
  port: ${PORT:8080}

spring:
  application:
    name: infrapulse-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/infrapulse}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:resend}
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-change-me-before-deploying-to-prod-32b}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

  mail:
    from: ${MAIL_FROM:no-reply@infrapulse.app}

  huggingface:
    api-url: ${HF_API_URL:https://api-inference.huggingface.co/models}
    token: ${HF_TOKEN:}
    enabled: ${HF_ENABLED:false}

  frontend:
    base-url: ${FRONTEND_URL:http://localhost:5173}

  seed:
    admin-email: ${SEED_ADMIN_EMAIL:admin@infrapulse.app}
    admin-password: ${SEED_ADMIN_PASSWORD:Admin@123}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.infrapulse: INFO
    org.springframework.security: WARN