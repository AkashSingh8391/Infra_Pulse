server:
  port: ${PORT:8080}

spring:
  application:
    name: infrapulse-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/infrapulse}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${RESEND_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY}

  cors:
    allowed-origins: ${CORS_ORIGINS}

  mail:
    from: ${MAIL_FROM}

  huggingface:
    api-url: ${HF_API_URL}
    token: ${HF_TOKEN}
    enabled: ${HF_ENABLED}

  frontend:
    base-url: ${FRONTEND_URL}

  seed:
    admin-email: ${SEED_ADMIN_EMAIL}
    admin-password: ${SEED_ADMIN_PASSWORD}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.infrapulse: INFO
    org.springframework.security: WARN